<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานสถานะยานพาหนะ - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (sessionStorage.getItem("portal_auth") !== "true") window.location.href = "index.html";</script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem; }
        @media print {
            body { background-color: white; font-size: 14pt !important; }
            #main-ui, nav, #vehicleModal { display: none !important; }
            #printArea { display: block !important; }
            @page { size: A4 landscape; margin: 1.5cm; } /* ปรับเป็นแนวนอนเพราะคอลัมน์เยอะขึ้น */
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid #999; padding: 8px; text-align: left; }
            th { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="printArea" class="hidden"></div>

    <div id="main-ui">
        <nav class="bg-[#1e3a8a] text-white shadow-md">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold">📊 ระบบรายงานสถานะยานพาหนะ เทศบาลนครขอนแก่น</h1>
                <div class="flex gap-3">
                    <a href="index.html" class="bg-blue-900 border border-blue-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-blue-800 transition">🏠 กลับหน้าหลัก</a>
                    <a href="admin.html" class="bg-white text-[#1e3a8a] px-4 py-2 rounded-md font-semibold hover:bg-gray-200 transition">⚙️ จัดการข้อมูล</a>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-8 max-w-7xl">
            <h2 class="text-xl font-bold text-gray-700 mb-4">สรุปจำนวนยานพาหนะ</h2>
            <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-[#1e3a8a] overflow-hidden">
                <div class="bg-gray-50 p-6 border-b border-gray-200 flex flex-col lg:flex-row gap-4 justify-between items-center">
                    <div class="w-full lg:w-1/3 relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                        <input type="text" id="searchInput" placeholder="ค้นหา: ทะเบียน, รหัส, ชื่อรถ, สถานะ..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1e3a8a]">
                    </div>
                    
                    <div class="w-full lg:w-2/3 flex flex-wrap gap-4 justify-end items-center">
                        <select id="typeFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1e3a8a] bg-white">
                            <option value="">-- ทุกประเภทรถ --</option>
                        </select>
                        <select id="statusFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1e3a8a] bg-white">
                            <option value="">-- ทุกสถานะ --</option>
                            <option value="ใช้งานปกติ">ใช้งานปกติ</option>
                            <option value="รอจำหน่าย">รอจำหน่าย</option>
                            <option value="จำหน่ายแล้ว">จำหน่ายแล้ว</option>
                            <option value="โอนต่อให้">โอนให้หน่วยงานอื่น</option>
                        </select>
                        <button onclick="printReport()" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg flex items-center gap-2 shadow transition">🖨️ พิมพ์รายการนี้</button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead>
                            <tr class="bg-[#1e3a8a] text-white">
                                <th class="p-4">รูปภาพ</th>
                                <th class="p-4">ทะเบียนรถ / รหัส</th>
                                <th class="p-4">ชื่อสินทรัพย์ / ประเภท</th>
                                <th class="p-4">หน่วยงานที่ดูแล</th>
                                <th class="p-4 text-center">สถานะ</th> <th class="p-4">วันต่อภาษี</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <tr><td colspan="6" class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-between items-center">
                    <div class="text-gray-600 font-medium" id="pageInfo">แสดงรายการที่ 0 ถึง 0</div>
                    <div class="flex gap-2">
                        <button id="prevBtn" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50">◀ ก่อนหน้า</button>
                        <button id="nextBtn" class="px-4 py-2 bg-[#1e3a8a] text-white rounded-lg hover:bg-blue-800 disabled:opacity-50">ถัดไป ▶</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="vehicleModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full mx-auto overflow-hidden transform scale-95 transition-transform" id="modalContent">
            <div class="bg-[#1e3a8a] text-white p-5 flex justify-between items-center">
                <h3 class="text-xl font-bold">📋 รายละเอียดข้อมูลยานพาหนะ</h3>
                <button onclick="closeModal()" class="text-white hover:text-red-300 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 md:p-8" id="modalBody"></div>
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allVehicles = [], filteredVehicles = [];
        let currentPage = 1; const itemsPerPage = 50;

        onValue(ref(db, 'vehicles'), (snapshot) => {
            const data = snapshot.val();
            if (!data) { document.getElementById('dataTableBody').innerHTML = '<tr><td colspan="6" class="p-8 text-center text-red-500">ไม่พบข้อมูล</td></tr>'; return; }
            
            allVehicles = Object.entries(data).map(([id, val]) => ({ id, ...val })).reverse();
            updateSummaryCards(allVehicles);
            populateFilterOptions(allVehicles);
            applyFilters();
        });

        function updateSummaryCards(dataList) {
            const typesCount = {};
            dataList.forEach(v => { typesCount[v.subType || "ไม่ระบุ"] = (typesCount[v.subType || "ไม่ระบุ"] || 0) + 1; });
            const sortedTypes = Object.entries(typesCount).sort((a, b) => b[1] - a[1]).slice(0, 7);
            
            const cardsContainer = document.getElementById('summaryCards');
            cardsContainer.innerHTML = `<div class="bg-gradient-to-r from-[#1e3a8a] to-blue-600 text-white p-5 rounded-xl"><h3 class="text-blue-100 font-semibold mb-1">ยอดรวมทั้งหมด</h3><p class="text-4xl font-bold">${dataList.length} <span class="text-lg font-normal">คัน</span></p></div>`;
            const colors = ['bg-blue-50', 'bg-green-50', 'bg-orange-50', 'bg-purple-50', 'bg-pink-50', 'bg-teal-50', 'bg-gray-50'];
            sortedTypes.forEach((item, index) => {
                cardsContainer.innerHTML += `<div class="${colors[index % colors.length]} border border-gray-100 p-5 rounded-xl shadow-sm"><h3 class="text-gray-500 font-semibold mb-1 truncate">${item[0]}</h3><p class="text-3xl font-bold text-gray-800">${item[1]} <span class="text-sm font-normal">คัน</span></p></div>`;
            });
        }

        function populateFilterOptions(dataList) {
            const types = new Set();
            dataList.forEach(v => { if(v.subType) types.add(v.subType.trim()); });
            const typeSelect = document.getElementById('typeFilter');
            const currentType = typeSelect.value;
            typeSelect.innerHTML = '<option value="">-- ทุกประเภทรถ --</option>';
            Array.from(types).sort().forEach(t => typeSelect.innerHTML += `<option value="${t}">${t}</option>`);
            typeSelect.value = currentType;
        }

        // ฟังก์ชันช่วยจัดการสีของสถานะรถ
        function getStatusBadge(status, transferTo) {
            const s = status || 'ใช้งานปกติ';
            if (s === 'ใช้งานปกติ') return '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200">✅ ใช้งานปกติ</span>';
            if (s === 'รอจำหน่าย') return '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">⏳ รอจำหน่าย</span>';
            if (s === 'จำหน่ายแล้ว') return '<span class="bg-gray-200 text-gray-600 px-3 py-1 rounded-full text-xs font-bold border border-gray-300">❌ จำหน่ายแล้ว</span>';
            if (s === 'โอนต่อให้') return `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold border border-blue-200">🔄 โอนให้:<br><span class="font-normal mt-1 block">${transferTo || 'ไม่ระบุ'}</span></span>`;
            return `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">✅ ใช้งานปกติ</span>`;
        }

        function applyFilters() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            filteredVehicles = allVehicles.filter(v => {
                const textToSearch = `${v.licensePlate || ''} ${v.assetId || ''} ${v.assetName || ''} ${v.status || ''} ${v.transferTo || ''}`.toLowerCase();
                const matchKeyword = textToSearch.includes(keyword);
                const matchType = (typeFilter === "") || (v.subType === typeFilter);
                
                // กรองสถานะ (รถเก่าที่ไม่มี status ให้ถือว่าเป็น "ใช้งานปกติ")
                const vStatus = v.status || 'ใช้งานปกติ';
                const matchStatus = (statusFilter === "") || (vStatus === statusFilter);

                return matchKeyword && matchType && matchStatus;
            });
            currentPage = 1; renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody'); tbody.innerHTML = '';
            const totalItems = filteredVehicles.length;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const paginatedData = filteredVehicles.slice(startIndex, endIndex);

            if (paginatedData.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-500">ไม่พบข้อมูลที่ตรงกับเงื่อนไขการค้นหา</td></tr>'; return;}

            paginatedData.forEach(v => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 transition cursor-pointer";
                tr.onclick = () => window.showModal(v.id);
                
                const imgCell = v.imageUrl ? `<img src="${v.imageUrl}" class="w-16 h-16 object-cover rounded-md shadow-sm border">` : '<div class="w-16 h-16 bg-gray-100 rounded-md flex items-center justify-center text-xs text-gray-400">ไม่มีรูป</div>';
                
                let dateColor = "text-gray-700";
                if(v.taxExpiry) {
                    const diffDays = Math.ceil((new Date(v.taxExpiry) - new Date()) / (1000 * 60 * 60 * 24));
                    if(diffDays < 0) dateColor = "text-red-600 font-bold bg-red-100 px-2 py-1 rounded";
                    else if (diffDays <= 30) dateColor = "text-orange-600 font-bold bg-orange-100 px-2 py-1 rounded";
                }

                // นำป้ายสถานะมาใส่ในคอลัมน์
                const statusBadge = getStatusBadge(v.status, v.transferTo);

                tr.innerHTML = `
                    <td class="p-4">${imgCell}</td>
                    <td class="p-4"><div class="font-bold text-lg">${v.licensePlate || '-'}</div><div class="text-sm text-gray-500 mt-1">ID: ${v.assetId || '-'}</div></td>
                    <td class="p-4"><div class="font-semibold text-[#1e3a8a]">${v.assetName || '-'}</div><div class="text-sm text-blue-600 bg-blue-100 inline-block px-2 py-0.5 rounded mt-1">${v.subType || '-'}</div></td>
                    <td class="p-4 font-medium">${v.department || '-'}</td>
                    <td class="p-4 text-center leading-relaxed">${statusBadge}</td>
                    <td class="p-4"><span class="${dateColor}">${v.taxExpiry || '-'}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('pageInfo').innerText = `แสดงรายการที่ ${startIndex + 1} ถึง ${endIndex} จากทั้งหมด ${totalItems} รายการ`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= Math.ceil(totalItems / itemsPerPage) || 1;
        }

        window.showModal = (id) => {
            const v = allVehicles.find(x => x.id === id);
            const modalBody = document.getElementById('modalBody');
            const imgDisplay = v.imageUrl ? `<img src="${v.imageUrl}" class="w-full max-w-[250px] rounded-xl shadow-lg">` : `<div class="w-full max-w-[250px] h-48 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400">ไม่มีรูปภาพ</div>`;

            let dateDisplay = '<span class="text-gray-500">-</span>';
            if(v.taxExpiry) {
                const diffDays = Math.ceil((new Date(v.taxExpiry) - new Date()) / (1000 * 60 * 60 * 24));
                if(diffDays < 0) dateDisplay = `<span class="text-red-600 font-bold">หมดอายุเมื่อ ${v.taxExpiry}</span>`;
                else if (diffDays <= 30) dateDisplay = `<span class="text-orange-600 font-bold">ใกล้ครบกำหนด ${v.taxExpiry}</span>`;
                else dateDisplay = `<span class="text-green-700 font-bold">ครบกำหนด ${v.taxExpiry}</span>`;
            }

            const statusBadge = getStatusBadge(v.status, v.transferTo);

            modalBody.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="md:w-1/3 flex justify-center items-start">${imgDisplay}</div>
                    <div class="md:w-2/3 grid grid-cols-2 gap-y-6 gap-x-4">
                        <div class="col-span-2 flex justify-between items-center border-b pb-4">
                            <div>
                                <p class="text-sm text-gray-500 font-semibold mb-1">หมายเลขทะเบียนรถ</p>
                                <p class="font-bold text-3xl text-[#1e3a8a]">${v.licensePlate || 'ไม่มีทะเบียน'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm text-gray-500 font-semibold mb-2">สถานะปัจจุบัน</p>
                                ${statusBadge}
                            </div>
                        </div>
                        <div class="col-span-2">
                            <p class="text-sm text-gray-500 font-semibold mb-1">ชื่อสินทรัพย์</p>
                            <p class="font-semibold text-gray-800 text-lg">${v.assetName || '-'}</p>
                        </div>
                        <div><p class="text-sm text-gray-500 font-semibold mb-1">รหัสสินทรัพย์</p><p class="text-gray-800 font-mono">${v.assetId || '-'}</p></div>
                        <div><p class="text-sm text-gray-500 font-semibold mb-1">ประเภทรถ</p><p class="text-blue-700 font-medium">${v.subType || '-'}</p></div>
                        <div><p class="text-sm text-gray-500 font-semibold mb-1">หน่วยงานที่ดูแล</p><p class="text-gray-800">${v.department || '-'}</p></div>
                        <div><p class="text-sm text-gray-500 font-semibold mb-1">วันต่อภาษีประจำปี</p><p>${dateDisplay}</p></div>
                        <div class="col-span-2"><p class="text-sm text-gray-500 font-semibold mb-1">ผู้รับผิดชอบ</p><p class="text-gray-800">${v.responsiblePerson || '-'}</p></div>
                    </div>
                </div>
            `;
            document.getElementById('vehicleModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalContent').classList.remove('scale-95'), 10);
        };

        window.closeModal = () => {
            document.getElementById('modalContent').classList.add('scale-95');
            setTimeout(() => document.getElementById('vehicleModal').classList.add('hidden'), 200);
        };

        window.printReport = () => {
            const printArea = document.getElementById('printArea');
            let html = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="font-size: 24pt;">รายงานสถานะยานพาหนะ เทศบาลนครขอนแก่น</h2>
                    <p style="font-size: 14pt; color: #555;">ยอดรวม: ${filteredVehicles.length} คัน</p>
                </div>
                <table>
                    <thead><tr><th>ลำดับ</th><th>ทะเบียนรถ/รหัส</th><th>ชื่อ/ประเภทรถ</th><th>หน่วยงาน</th><th>สถานะ</th><th>วันต่อภาษี</th></tr></thead>
                    <tbody>
            `;
            filteredVehicles.forEach((v, idx) => {
                const s = v.status || 'ใช้งานปกติ';
                const statusTxt = s === 'โอนต่อให้' ? `โอนให้: ${v.transferTo || '-'}` : s;
                html += `<tr>
                    <td style="text-align:center">${idx + 1}</td>
                    <td><b>${v.licensePlate || '-'}</b><br><small>${v.assetId}</small></td>
                    <td>${v.assetName || '-'}<br><small>${v.subType || '-'}</small></td>
                    <td>${v.department || '-'}</td>
                    <td>${statusTxt}</td>
                    <td>${v.taxExpiry || '-'}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            printArea.innerHTML = html;
            window.print();
        };

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters); // กรองสถานะได้
        document.getElementById('prevBtn').addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderTable(); }});
        document.getElementById('nextBtn').addEventListener('click', () => { if(currentPage < Math.ceil(filteredVehicles.length / itemsPerPage)) { currentPage++; renderTable(); }});
    </script>
</body>
</html>
