<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อมูลยานพาหนะ - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem;}
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#1e3a8a] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">⚙️ จัดการข้อมูลยานพาหนะ (Admin)</h1>
            <div class="flex gap-2">
                <a href="index.html" class="bg-blue-900 border border-blue-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-blue-800 transition">🏠 หน้าหลัก Portal</a>
                <a href="vehicle.html" class="bg-gray-200 text-[#1e3a8a] px-4 py-2 rounded-md font-semibold hover:bg-white transition">📊 แดชบอร์ดข้อมูลรถ</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 max-w-4xl">
        <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-[#1e3a8a]">
            <h2 class="text-2xl font-bold mb-6 text-[#1e3a8a]">เพิ่มข้อมูลยานพาหนะใหม่</h2>
            
            <form id="vehicleForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">รหัสสินทรัพย์</label>
                        <input type="text" id="assetId" required class="w-full px-4 py-3 border rounded-lg bg-gray-50" placeholder="เช่น 246600003">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">ชื่อสินทรัพย์</label>
                        <input type="text" id="assetName" required class="w-full px-4 py-3 border rounded-lg bg-gray-50" placeholder="เช่น รถจักรยานยนต์...">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">ชนิดย่อยสินทรัพย์</label>
                        <input type="text" id="subType" required class="w-full px-4 py-3 border rounded-lg bg-gray-50" placeholder="เช่น รถบรรทุก / รถจักรยานยนต์">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">สถานที่ตั้ง (หน่วยงาน)</label>
                        <input type="text" id="department" required class="w-full px-4 py-3 border rounded-lg bg-gray-50" placeholder="เช่น สำนักสาธารณสุข">
                    </div>
                    <div>
                        <label class="block text-[#1e3a8a] font-semibold mb-2">หมายเลขทะเบียนรถ</label>
                        <input type="text" id="licensePlate" required class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" placeholder="เช่น 2กธ 4606 ขอนแก่น">
                    </div>
                    <div>
                        <label class="block text-red-600 font-semibold mb-2">วันครบกำหนดต่อภาษี</label>
                        <input type="date" id="taxExpiry" required class="w-full px-4 py-3 border-2 border-red-200 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-[#1e3a8a] font-semibold mb-2">ผู้รับผิดชอบ</label>
                        <input type="text" id="responsiblePerson" required class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" placeholder="ชื่อ-นามสกุล">
                    </div>
                    <div>
                        <label class="block text-[#1e3a8a] font-semibold mb-2">ภาพถ่ายตัวรถ</label>
                        <input type="file" id="vehicleImage" accept="image/*" class="w-full px-4 py-2 border-2 border-blue-200 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full bg-[#1e3a8a] hover:bg-blue-800 text-white font-bold py-4 rounded-lg shadow-lg text-xl">
                        บันทึกข้อมูลเข้าระบบ
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:9f2a9f8b7faf596a6ebef8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dk0ypev4m/image/upload";
        const UPLOAD_PRESET = "khonkaen_preset";

        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'กำลังบันทึกข้อมูล...';

            try {
                let imageUrl = "";
                const fileInput = document.getElementById('vehicleImage').files[0];

                if (fileInput) {
                    const formData = new FormData();
                    formData.append('file', fileInput);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                    const uploadResult = await res.json();
                    imageUrl = uploadResult.secure_url;
                }

                const vehicleData = {
                    assetId: document.getElementById('assetId').value,
                    assetName: document.getElementById('assetName').value,
                    subType: document.getElementById('subType').value,
                    department: document.getElementById('department').value,
                    licensePlate: document.getElementById('licensePlate').value,
                    taxExpiry: document.getElementById('taxExpiry').value,
                    responsiblePerson: document.getElementById('responsiblePerson').value,
                    imageUrl: imageUrl,
                    createdAt: new Date().toISOString()
                };

                await set(push(ref(db, 'vehicles')), vehicleData);

                Swal.fire({ title: 'บันทึกสำเร็จ!', text: 'เพิ่มข้อมูลเรียบร้อย', icon: 'success', confirmButtonColor: '#1e3a8a' });
                document.getElementById('vehicleForm').reset();
            } catch (error) {
                console.error(error);
                Swal.fire('ผิดพลาด!', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'บันทึกข้อมูลเข้าระบบ';
            }
        });
    </script>
</body>
</html>
