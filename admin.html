<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อมูลยานพาหนะ - Admin</title>
    <script>if (sessionStorage.getItem("portal_auth") !== "true") window.location.href = "index.html";</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem;} </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#1e3a8a] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">⚙️ จัดการข้อมูลยานพาหนะ (Admin)</h1>
            <div class="flex gap-2">
                <a href="vehicle.html" class="bg-blue-900 border border-blue-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-blue-800 transition">◀ กลับหน้ารายงาน</a>
                <button id="logoutBtn" class="bg-red-500 border border-red-700 text-white px-4 py-2 rounded-md font-semibold hover:bg-red-600 transition">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <main id="appContent" class="container mx-auto px-6 py-10 max-w-6xl">
        <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-[#1e3a8a] mb-10">
            <h2 id="formTitle" class="text-2xl font-bold mb-6 text-[#1e3a8a]">เพิ่มข้อมูลยานพาหนะใหม่</h2>
            
            <form id="vehicleForm" class="space-y-6">
                <input type="hidden" id="editingId" value="">
                <input type="hidden" id="oldImageUrl" value="">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block font-semibold mb-2">รหัสสินทรัพย์</label><input type="text" id="assetId" required class="w-full px-4 py-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block font-semibold mb-2">ชื่อสินทรัพย์</label><input type="text" id="assetName" required class="w-full px-4 py-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block font-semibold mb-2">ชนิดย่อยสินทรัพย์</label><input type="text" id="subType" required class="w-full px-4 py-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block font-semibold mb-2">สถานที่ตั้ง (หน่วยงาน)</label><input type="text" id="department" required class="w-full px-4 py-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block text-[#1e3a8a] font-semibold mb-2">หมายเลขทะเบียนรถ</label><input type="text" id="licensePlate" class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg focus:ring-2 focus:ring-[#1e3a8a] outline-none"></div>
                    <div><label class="block text-red-600 font-semibold mb-2">วันครบกำหนดต่อภาษี</label><input type="date" id="taxExpiry" class="w-full px-4 py-3 border-2 border-red-200 rounded-lg focus:ring-2 focus:ring-red-500 outline-none"></div>
                    <div><label class="block text-[#1e3a8a] font-semibold mb-2">ผู้รับผิดชอบ</label><input type="text" id="responsiblePerson" class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg focus:ring-2 focus:ring-[#1e3a8a] outline-none"></div>
                    
                    <div>
                        <label class="block text-[#1e3a8a] font-semibold mb-2">สถานะยานพาหนะ</label>
                        <select id="status" onchange="toggleTransferInput()" class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg focus:ring-2 focus:ring-[#1e3a8a] outline-none bg-white">
                            <option value="ใช้งานปกติ">ใช้งานปกติ</option>
                            <option value="รอจำหน่าย">รอจำหน่าย</option>
                            <option value="จำหน่ายแล้ว">จำหน่ายแล้ว</option>
                            <option value="โอนต่อให้">โอนต่อให้...</option>
                        </select>
                    </div>
                    <div id="transferContainer" class="hidden">
                        <label class="block text-blue-600 font-semibold mb-2">ระบุชื่อหน่วยงานที่รับโอน</label>
                        <input type="text" id="transferTo" class="w-full px-4 py-3 border-2 border-blue-200 rounded-lg focus:ring-2 focus:ring-[#1e3a8a] outline-none" placeholder="เช่น อบจ.ขอนแก่น">
                    </div>

                    <div><label class="block text-[#1e3a8a] font-semibold mb-2">ภาพถ่ายตัวรถ <span class="text-sm font-normal text-gray-500">(ปล่อยว่างได้)</span></label><input type="file" id="vehicleImage" accept="image/*" class="w-full px-4 py-2 border-2 border-blue-200 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"></div>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="submit" id="submitBtn" class="flex-1 bg-[#1e3a8a] hover:bg-blue-800 text-white font-bold py-4 rounded-lg shadow-lg text-xl transition">บันทึกข้อมูล</button>
                    <button type="button" id="cancelEditBtn" class="hidden bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-4 px-8 rounded-lg shadow-lg text-xl transition" onclick="cancelEdit()">ยกเลิกแก้ไข</button>
                </div>
            </form>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">📋 รายการยานพาหนะในระบบ</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="p-3">รูปภาพ</th>
                            <th class="p-3">รหัส / ทะเบียน</th>
                            <th class="p-3">ชื่อสินทรัพย์ / หน่วยงาน</th>
                            <th class="p-3">สถานะ</th>
                            <th class="p-3 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dk0ypev4m/image/upload";
        const UPLOAD_PRESET = "khonkaen_preset";
        let vehiclesData = {}; 

        // ออกจากระบบ
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem("portal_auth");
            window.location.href = 'index.html';
        });

        window.toggleTransferInput = () => {
            const status = document.getElementById('status').value;
            const transferContainer = document.getElementById('transferContainer');
            if(status === 'โอนต่อให้') {
                transferContainer.classList.remove('hidden');
            } else {
                transferContainer.classList.add('hidden');
                document.getElementById('transferTo').value = ''; 
            }
        };

        // โหลดข้อมูล
        onValue(ref(db, 'vehicles'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('dataTableBody');
            if (!data) { tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">ไม่มีข้อมูล</td></tr>'; return; }
            vehiclesData = data;
            tbody.innerHTML = '';
            Object.entries(data).reverse().forEach(([id, v]) => {
                const statusText = v.status === 'โอนต่อให้' ? `โอนให้: ${v.transferTo || '-'}` : (v.status || 'ใช้งานปกติ');
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3">${v.imageUrl ? `<img src="${v.imageUrl}" class="w-16 h-16 object-cover rounded">` : 'ไม่มีรูป'}</td>
                        <td class="p-3 font-bold">${v.licensePlate || '-'}<br><span class="text-sm font-normal text-gray-500">รหัส: ${v.assetId}</span></td>
                        <td class="p-3">${v.assetName || '-'}<br><span class="text-sm text-gray-500">${v.department}</span></td>
                        <td class="p-3 text-blue-700 font-semibold">${statusText}</td>
                        <td class="p-3 text-center">
                            <button onclick="editVehicle('${id}')" class="bg-yellow-400 text-white px-3 py-1 rounded shadow mb-1">แก้ไข</button>
                            <button onclick="deleteVehicle('${id}')" class="bg-red-500 text-white px-3 py-1 rounded shadow">ลบ</button>
                        </td>
                    </tr>
                `;
            });
        });

        // บันทึก/แก้ไขข้อมูล
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const editingId = document.getElementById('editingId').value;
            submitBtn.disabled = true; submitBtn.innerHTML = 'กำลังบันทึก... ⏳';

            try {
                let imageUrl = document.getElementById('oldImageUrl').value;
                const fileInput = document.getElementById('vehicleImage').files[0];
                if (fileInput) {
                    const formData = new FormData(); formData.append('file', fileInput); formData.append('upload_preset', UPLOAD_PRESET);
                    const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                    imageUrl = (await res.json()).secure_url;
                }

                const vehicleData = {
                    assetId: document.getElementById('assetId').value,
                    assetName: document.getElementById('assetName').value,
                    subType: document.getElementById('subType').value,
                    department: document.getElementById('department').value,
                    licensePlate: document.getElementById('licensePlate').value,
                    taxExpiry: document.getElementById('taxExpiry').value,
                    responsiblePerson: document.getElementById('responsiblePerson').value,
                    status: document.getElementById('status').value,
                    transferTo: document.getElementById('transferTo').value,
                    imageUrl: imageUrl
                };

                if (editingId) {
                    await update(ref(db, 'vehicles/' + editingId), vehicleData);
                    Swal.fire({ title: 'สำเร็จ!', text: 'แก้ไขข้อมูลเรียบร้อย', icon: 'success' });
                } else {
                    vehicleData.createdAt = new Date().toISOString();
                    await set(push(ref(db, 'vehicles')), vehicleData);
                    Swal.fire({ title: 'สำเร็จ!', text: 'เพิ่มข้อมูลเรียบร้อย', icon: 'success' });
                }
                window.cancelEdit();
            } catch (error) { Swal.fire('ผิดพลาด!', 'ไม่สามารถบันทึกได้', 'error'); } 
            finally { submitBtn.disabled = false; submitBtn.innerHTML = editingId ? 'อัปเดตข้อมูล' : 'บันทึกข้อมูล'; }
        });

        // --- ระบบยืนยันรหัสผ่านก่อนลบ (878556) ---
        window.deleteVehicle = (id) => {
            Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: 'กรุณากรอกรหัสผ่าน 6 หลักเพื่อยืนยันสิทธิ์',
                input: 'password',
                inputAttributes: { autocapitalize: 'off', maxlength: 6 },
                showCancelButton: true,
                confirmButtonText: 'ยืนยันลบข้อมูล',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#d33'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    if (result.value === '878556') {
                        await remove(ref(db, 'vehicles/' + id));
                        Swal.fire('ลบแล้ว!', 'ข้อมูลถูกลบออกจากระบบเรียบร้อย', 'success');
                    } else {
                        Swal.fire('รหัสผ่านไม่ถูกต้อง!', 'คุณไม่ได้รับสิทธิ์ในการลบข้อมูลนี้', 'error');
                    }
                }
            });
        };

        window.editVehicle = (id) => {
            const v = vehiclesData[id];
            document.getElementById('editingId').value = id;
            document.getElementById('oldImageUrl').value = v.imageUrl || '';
            document.getElementById('assetId').value = v.assetId || '';
            document.getElementById('assetName').value = v.assetName || '';
            document.getElementById('subType').value = v.subType || '';
            document.getElementById('department').value = v.department || '';
            document.getElementById('licensePlate').value = v.licensePlate || '';
            document.getElementById('taxExpiry').value = v.taxExpiry || '';
            document.getElementById('responsiblePerson').value = v.responsiblePerson || '';
            document.getElementById('status').value = v.status || 'ใช้งานปกติ';
            document.getElementById('transferTo').value = v.transferTo || '';
            window.toggleTransferInput(); 

            document.getElementById('cancelEditBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            document.getElementById('vehicleForm').reset();
            document.getElementById('editingId').value = '';
            document.getElementById('status').value = 'ใช้งานปกติ';
            window.toggleTransferInput(); 
            document.getElementById('cancelEditBtn').classList.add('hidden');
        };
    </script>
</body>
</html>
