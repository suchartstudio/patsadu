<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-2xl shadow-xl max-w-md w-full text-center border-t-4 border-[#1e3a8a]">
        <div class="text-5xl mb-4">🏛️</div>
        <h2 class="text-2xl font-bold text-[#1e3a8a] mb-2">เข้าสู่ระบบ (Login)</h2>
        <p class="text-gray-500 mb-8">ระบบพอร์ทัลกลาง เทศบาลนครขอนแก่น</p>

        <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 rounded-lg px-6 py-3 text-gray-700 font-semibold hover:bg-gray-50 transition shadow-sm">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6">
            เข้าสู่ระบบด้วยบัญชี Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:9f2a9f8b7faf596a6ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try {
                // 1. ล็อกอินด้วย Google Popup
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // 2. ตรวจสอบข้อมูลในฐานข้อมูล (โหนด users)
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);

                let role = 'user'; // สิทธิ์เริ่มต้น
                
                if (snapshot.exists()) {
                    role = snapshot.val().role; // ดึงสิทธิ์เดิมที่มีอยู่
                } else {
                    // ถ้าเข้าครั้งแรก ให้บันทึกลงฐานข้อมูลเป็น 'user'
                    await set(userRef, {
                        email: user.email,
                        name: user.displayName,
                        role: 'user',
                        createdAt: new Date().toISOString()
                    });
                }

                // 3. แจ้งเตือนและเปลี่ยนหน้าตามสิทธิ์
                Swal.fire({
                    title: 'เข้าสู่ระบบสำเร็จ',
                    text: `ยินดีต้อนรับคุณ ${user.displayName}`,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    if (role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html'; // ผู้ใช้ทั่วไปไปหน้า Portal
                    }
                });

            } catch (error) {
                console.error(error);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าสู่ระบบได้', 'error');
            }
        });
    </script>
</body>
</html>
