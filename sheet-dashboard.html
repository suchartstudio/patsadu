<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Dashboard - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#166534] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">📈 ระบบฐานข้อมูลโครงการ (Google Sheets)</h1>
            <a href="index.html" class="bg-green-800 border border-green-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-green-700 transition shadow-sm">🏠 กลับหน้าหลัก</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-7xl">
        <div id="loading" class="text-center py-20 text-gray-500 text-xl animate-pulse">⏳ กำลังโหลดข้อมูล...</div>

        <div id="dashboardContent" class="hidden">
            <h2 class="text-xl font-bold text-gray-700 mb-4">สรุปข้อมูลวงเงินงบประมาณ</h2>
            <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"></div>

            <div class="card mb-8">
                <h3 class="text-lg font-semibold mb-4 text-gray-700" id="chartTitle">แนวโน้มงบประมาณรายปี (ปีที่ผ่านมา)</h3>
                <div class="relative w-full h-64 md:h-80"><canvas id="mainChart"></canvas></div>
            </div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-green-600 overflow-hidden">
                <div class="bg-gray-50 p-6 border-b border-gray-200">
                    <input type="text" id="searchInput" placeholder="🔍 ค้นหาข้อมูล..." class="w-full md:w-1/3 p-3 border rounded-lg shadow-sm">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr class="bg-green-700 text-white" id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="bg-gray-50 p-4 border-t flex justify-between items-center">
                    <div id="pageInfo" class="text-gray-600"></div>
                    <div class="flex gap-2">
                        <button id="prevBtn" class="px-4 py-2 bg-white border rounded">◀</button>
                        <button id="nextBtn" class="px-4 py-2 bg-green-700 text-white rounded">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="sheetModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full p-8 overflow-y-auto max-h-[90vh]" id="modalBody"></div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1B2-0bB79ftvpEcWTq5wITVb9XlVdZ2g1c1-1ruD_2Bg/export?format=csv";
        let allData = [], filteredData = [], headers = [];
        const displayHeaders = ["ปีงบ", "ชื่อโครงการ", "ชุมชน", "วงเงิน"]; 
        let currentPage = 1; const itemsPerPage = 30;

        Papa.parse(SHEET_CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(r => Object.values(r).some(v => v));
                headers = Object.keys(allData[0]);
                
                const lastYear = new Date().getFullYear() - 1;
                const filterDate = new Date(`${lastYear}-10-01`);
                const dateCol = headers.find(h => h.includes("วันที่")) || "ปีงบ";

                filteredData = allData.filter(r => new Date(r[dateCol]) >= filterDate || parseInt(r[dateCol]) >= lastYear);
                initDashboard();
            }
        });

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
            updateSummaryCards(filteredData);
            drawYearlyChart();
            renderTableHeader();
            renderTable();
        }

        function updateSummaryCards(dataList) {
            let total = 0, deptBudget = {};
            dataList.forEach(r => {
                let amt = parseFloat(String(r["วงเงิน"]||0).replace(/,/g, ''));
                total += amt || 0;
                let dept = r["หน่วยงาน"] || "ไม่ระบุ";
                deptBudget[dept] = (deptBudget[dept] || 0) + (amt || 0);
            });
            const cards = document.getElementById('summaryCards');
            cards.innerHTML = `<div class="col-span-full bg-green-700 text-white p-6 rounded-xl">ยอดรวม: ฿${total.toLocaleString()}</div>`;
            Object.entries(deptBudget).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(i => {
                cards.innerHTML += `<div class="bg-white p-4 rounded shadow border-l-4 border-green-500">${i[0]}<br><b>฿${i[1].toLocaleString()}</b></div>`;
            });
        }

        function drawYearlyChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            let yearly = {};
            allData.forEach(r => {
                let y = parseInt(r["ปีงบ"]);
                if(y && y < new Date().getFullYear()) yearly[y] = (yearly[y] || 0) + (parseFloat(r["วงเงิน"]?.replace(/,/g,''))||0);
            });
            new Chart(ctx, { type: 'line', data: { labels: Object.keys(yearly), datasets: [{ label: 'งบรายปี', data: Object.values(yearly), borderColor: '#166534' }] }});
        }

        function renderTableHeader() {
            document.getElementById('tableHeader').innerHTML = displayHeaders.map(h => `<th class="p-4">${h}</th>`).join('');
        }

        function renderTable() {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            filteredData.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage).forEach(row => {
                let tr = document.createElement('tr');
                tr.className = "border-b hover:bg-green-50 cursor-pointer";
                tr.onclick = () => showModal(row);
                tr.innerHTML = displayHeaders.map(h => `<td class="p-4">${row[h]||'-'}</td>`).join('');
                body.appendChild(tr);
            });
        }

        function showModal(row) {
            document.getElementById('modalBody').innerHTML = Object.entries(row).map(([k,v]) => `<div class="mb-2"><b>${k}:</b> ${v}</div>`).join('');
            document.getElementById('sheetModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('sheetModal').classList.add('hidden'); }
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filteredData = allData.filter(r => Object.values(r).some(v => v?.toLowerCase().includes(e.target.value.toLowerCase())));
            renderTable();
        });
    </script>
</body>
</html>
