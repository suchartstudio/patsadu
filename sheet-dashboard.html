<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard โครงการ - เทศบาลนครขอนแก่น</title>
    <script>if (sessionStorage.getItem("portal_auth") !== "true") window.location.href = "index.html";</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#166534] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">📈 ระบบฐานข้อมูลโครงการ</h1>
            <div class="flex gap-2">
                <a href="index.html" class="bg-green-800 text-white px-4 py-2 rounded-md font-semibold hover:bg-green-700 transition">🏠 กลับหน้าหลัก</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-7xl">
        <div id="loading" class="text-center py-20 text-gray-500 text-xl animate-pulse">⏳ กำลังประมวลผลข้อมูล...</div>

        <div id="dashboardContent" class="hidden">
            <div class="card mb-8 w-full">
                <h3 class="text-lg font-semibold mb-4 text-gray-700">จำนวนโครงการ (หลัง ต.ค. ปีก่อน - ไม่รวมเทศบาล)</h3>
                <div class="relative w-full h-[500px]"><canvas id="projectChart"></canvas></div>
            </div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-green-600 overflow-hidden mb-8">
                <div class="bg-gray-50 p-6 border-b border-gray-200">
                    <div class="flex flex-wrap gap-4 items-center">
                        <input type="text" id="searchInput" placeholder="🔍 ค้นหาโครงการ..." class="w-full md:w-1/4 p-3 border rounded-lg shadow-sm">
                        <select id="yearFilter" class="p-3 border rounded-lg bg-white w-full md:w-1/5"><option value="">-- ทุกปีงบ --</option></select>
                        <select id="communityFilter" class="p-3 border rounded-lg bg-white w-full md:w-1/5"><option value="">-- ทุกชุมชน --</option></select>
                    </div>
                    <div id="summaryCards" class="mt-6"></div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr class="bg-green-700 text-white" id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="sheetModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full p-8 overflow-y-auto max-h-[90vh]" id="modalBody"></div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1B2-0bB79ftvpEcWTq5wITVb9XlVdZ2g1c1-1ruD_2Bg/export?format=csv";
        let allData = [], filteredData = [], headers = [];
        const displayHeaders = ["ปีงบ", "ชื่อโครงการ", "ชุมชน", "วงเงิน"]; 
        let projectChart;

        Papa.parse(SHEET_CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(r => Object.values(r).some(v => v));
                headers = Object.keys(allData[0]);
                
                // ดึงรายการปีงบประมาณ และเรียงจากมากไปน้อย
                const yearsArray = [...new Set(allData.map(r => parseInt(r["ปีงบ"])).filter(v => !isNaN(v)))].sort((a,b) => b - a);
                const comms = new Set(allData.map(r => r["ชุมชน"]).filter(v => v));
                
                const yearSelect = document.getElementById('yearFilter');
                yearsArray.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
                
                const commSelect = document.getElementById('communityFilter');
                comms.forEach(c => commSelect.innerHTML += `<option value="${c}">${c}</option>`);
                
                // --- ตั้งค่าตัวกรองเบื้องต้น ---
                if (yearsArray.length > 0) {
                    yearSelect.value = yearsArray[0]; // เลือกปีล่าสุดเสมอ
                }
                commSelect.value = ""; // เลือกทุกชุมชน
                
                initDashboard();
            }
        });

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
            
            applyFilters(); // กรองข้อมูลตามค่าเริ่มต้นทันที (ตาราง & ป้ายสรุปจะอิงตามปีล่าสุด)
            drawProjectChart(); // วาดกราฟ
        }

        function updateSummaryCards(dataList) {
            let total = dataList.reduce((sum, r) => sum + (parseFloat(String(r["วงเงิน"]||0).replace(/,/g, ''))||0), 0);
            const cards = document.getElementById('summaryCards');
            cards.innerHTML = `
                <div class="bg-green-700 text-white p-6 rounded-xl shadow-lg flex items-center justify-between">
                    <span class="text-lg">ยอดรวมงบประมาณตามตัวกรอง:</span>
                    <span class="text-3xl font-bold">฿ ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>`;
        }

        function drawProjectChart() {
            const ctx = document.getElementById('projectChart').getContext('2d');
            if(projectChart) projectChart.destroy();
            const cutoff = new Date(`${new Date().getFullYear()-1}-10-01`);
            
            // กราฟจะแสดงภาพรวมหลัง ต.ค. ปีก่อน เสมอ ไม่ว่าตัวกรองด้านล่างจะเป็นปีอะไรก็ตาม
            const chartData = allData.filter(r => {
                const dateVal = new Date(r["วันที่"] || '2026-01-01');
                const str = (r["ชุมชน"] + r["หน่วยงาน"] + r["ชื่อโครงการ"]).toLowerCase();
                const comm = (r["ชุมชน"] || "").trim();
                return dateVal >= cutoff && !str.includes("เทศบาล") && comm !== "" && comm !== "ไม่ระบุ";
            });

            let counts = {};
            chartData.forEach(r => counts[r["ชุมชน"]] = (counts[r["ชุมชน"]] || 0) + 1);
            let sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);

            projectChart = new Chart(ctx, {
                type: 'bar', plugins: [ChartDataLabels],
                data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: '#16a34a' }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: { anchor: 'end', align: 'top', color: '#166534', font: {weight: 'bold', size: 14} } },
                    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                }
            });
        }

        function renderTable() {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            document.getElementById('tableHeader').innerHTML = displayHeaders.map(h => `<th class="p-4">${h}</th>`).join('');
            
            if(filteredData.length === 0) {
                body.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">ไม่พบข้อมูลที่ตรงกับตัวกรอง</td></tr>';
                return;
            }

            filteredData.forEach(row => {
                let tr = document.createElement('tr');
                tr.className = "border-b hover:bg-green-50 cursor-pointer transition";
                tr.onclick = () => {
                    document.getElementById('modalBody').innerHTML = Object.entries(row).map(([k,v]) => `<div class="mb-3 border-b pb-1"><b>${k}:</b> ${v || '-'}</div>`).join('');
                    document.getElementById('sheetModal').classList.remove('hidden');
                };
                tr.innerHTML = displayHeaders.map(h => {
                    let val = row[h] || '-';
                    if (h === 'วงเงิน' && val !== '-') val = '฿ ' + parseFloat(val.replace(/,/g, '')).toLocaleString();
                    return `<td class="p-4">${val}</td>`;
                }).join('');
                body.appendChild(tr);
            });
        }

        function applyFilters() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const comm = document.getElementById('communityFilter').value;
            
            filteredData = allData.filter(r => {
                const matchKw = Object.values(r).some(v => v?.toLowerCase().includes(kw));
                const matchYear = year === "" || String(r["ปีงบ"]) === year;
                const matchComm = comm === "" || r["ชุมชน"] === comm;
                return matchKw && matchYear && matchComm;
            });
            
            renderTable(); 
            updateSummaryCards(filteredData);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('communityFilter').addEventListener('change', applyFilters);
        window.onclick = (e) => { if(e.target == document.getElementById('sheetModal')) document.getElementById('sheetModal').classList.add('hidden'); };
    </script>
</body>
</html>
