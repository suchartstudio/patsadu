<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Dashboard - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#166534] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">📈 ระบบฐานข้อมูลอัจฉริยะ (Google Sheets)</h1>
            <a href="index.html" class="bg-green-800 border border-green-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-green-700 transition shadow-sm">🏠 กลับหน้าหลัก Portal</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-7xl">
        <div id="loading" class="text-center py-20 text-gray-500 text-xl animate-pulse">
            ⏳ กำลังเชื่อมต่อและโหลดข้อมูลจาก Google Sheets...
        </div>

        <div id="dashboardContent" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card border-t-4 border-green-600 flex flex-col justify-center items-center">
                    <h3 class="text-gray-500 font-semibold mb-2">จำนวนรายการทั้งหมดใน Sheet</h3>
                    <p class="text-5xl font-bold text-green-700" id="totalRecords">0</p>
                    <p class="text-sm text-gray-400 mt-2">รายการ (แถว)</p>
                </div>
                <div class="card md:col-span-2">
                    <h3 class="text-lg font-semibold mb-4 text-gray-700" id="chartTitle">วิเคราะห์สัดส่วนข้อมูล</h3>
                    <div class="relative w-full h-64">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-green-600 overflow-hidden">
                <div class="bg-gray-50 p-6 border-b border-gray-200">
                    <div class="relative w-full md:w-1/2">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                        <input type="text" id="searchInput" placeholder="พิมพ์เพื่อค้นหาข้อมูล (ค้นหาได้จากทุกคอลัมน์)..." 
                               class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-green-700 text-white" id="tableHeader">
                                </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
                
                <div class="bg-gray-50 p-4 border-t border-gray-200 flex justify-between items-center">
                    <div class="text-gray-600 font-medium" id="pageInfo">แสดงรายการ...</div>
                    <div class="flex gap-2">
                        <button id="prevBtn" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50">◀ ก่อนหน้า</button>
                        <button id="nextBtn" class="px-4 py-2 bg-green-700 text-white rounded-lg hover:bg-green-800 disabled:opacity-50">ถัดไป ▶</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="sheetModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full mx-auto overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-green-700 text-white p-5 flex justify-between items-center">
                <h3 class="text-xl font-bold">📋 รายละเอียดข้อมูลแบบเต็ม</h3>
                <button onclick="closeModal()" class="text-white hover:text-green-300 text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 md:p-8 overflow-y-auto bg-gray-50" id="modalBody">
                </div>
            <div class="bg-white px-6 py-4 border-t border-gray-200 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        // แปลง URL แชร์ เป็น URL สำหรับการ Export CSV
        const SHEET_ID = "1B2-0bB79ftvpEcWTq5wITVb9XlVdZ2g1c1-1ruD_2Bg";
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        let allData = [];
        let filteredData = [];
        let headers = [];
        let displayHeaders = []; // เอาไว้แสดงแค่ 5 คอลัมน์แรกในตารางกันหน้าเละ
        let currentPage = 1;
        const itemsPerPage = 30;
        let mainChart = null;

        // 1. โหลดและแปลงข้อมูลด้วย PapaParse
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // กรองแถวที่ว่างเปล่าออก
                allData = results.data.filter(row => Object.values(row).some(val => val !== ""));
                
                if(allData.length > 0) {
                    headers = Object.keys(allData[0]);
                    displayHeaders = headers.slice(0, 5); // เลือกมาแสดงในตารางหลัก 5 คอลัมน์แรก
                    filteredData = [...allData];
                    initDashboard();
                } else {
                    document.getElementById('loading').innerText = "❌ ไม่พบข้อมูลใน Spreadsheet";
                }
            },
            error: function(err) {
                document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล (โปรดตรวจสอบการตั้งค่าแชร์ไฟล์)";
            }
        });

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');

            document.getElementById('totalRecords').innerText = allData.length;

            drawSmartChart();
            renderTableHeader();
            renderTable();
        }

        // 2. วิเคราะห์หาคอลัมน์ที่เหมาะสมสำหรับทำกราฟอัตโนมัติ
        function drawSmartChart() {
            let targetCol = null;
            // หาคอลัมน์ที่มีค่าซ้ำกัน (เพื่อจัดหมวดหมู่) โดยมีกลุ่ม 2 - 15 กลุ่ม
            for(let h of headers) {
                let unique = new Set(allData.map(item => item[h]).filter(v => v));
                if(unique.size >= 2 && unique.size <= 15) {
                    targetCol = h;
                    break;
                }
            }

            if(targetCol) {
                document.getElementById('chartTitle').innerText = `สัดส่วนข้อมูลแบ่งตาม: ${targetCol}`;
                
                let counts = {};
                allData.forEach(item => {
                    let val = item[targetCol] || 'ไม่ระบุ';
                    counts[val] = (counts[val] || 0) + 1;
                });

                let sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
                let labels = sorted.map(x => x[0]);
                let data = sorted.map(x => x[1]);

                const ctx = document.getElementById('mainChart').getContext('2d');
                mainChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'จำนวนรายการ',
                            data: data,
                            backgroundColor: ['#16a34a', '#2563eb', '#d97706', '#dc2626', '#7c3aed', '#0891b2']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } else {
                document.getElementById('chartTitle').innerText = "ข้อมูลหลากหลายเกินไป ไม่สามารถจัดกลุ่มกราฟได้";
            }
        }

        // 3. การแสดงผลตาราง (Table)
        function renderTableHeader() {
            let tr = '';
            displayHeaders.forEach(h => tr += `<th class="p-4">${h}</th>`);
            document.getElementById('tableHeader').innerHTML = tr;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const totalItems = filteredData.length;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
            const paginatedData = filteredData.slice(startIndex, endIndex);

            if(paginatedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${displayHeaders.length}" class="p-8 text-center text-gray-500">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
                document.getElementById('pageInfo').innerText = "ไม่มีรายการให้แสดงผล";
                return;
            }

            paginatedData.forEach(row => {
                let tr = document.createElement('tr');
                tr.className = "border-b bg-white hover:bg-green-50 transition duration-150 cursor-pointer";
                tr.onclick = () => window.showModal(row); // ผูกเหตุการณ์คลิกเปิด Pop-up
                
                displayHeaders.forEach((h, index) => {
                    let td = document.createElement('td');
                    td.className = "p-4 text-gray-700";
                    // ทำให้คอลัมน์แรกเป็นตัวหนา
                    if(index === 0) td.classList.add("font-bold", "text-gray-900");
                    td.innerText = row[h] || '-';
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            });
            
            document.getElementById('pageInfo').innerText = `แสดงรายการที่ ${startIndex + 1} ถึง ${endIndex} จากทั้งหมด ${totalItems} รายการ`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= Math.ceil(totalItems / itemsPerPage);
        }

        // 4. ระบบค้นหา (ค้นได้จากทุกคอลัมน์)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            let keyword = e.target.value.toLowerCase().trim();
            if(!keyword) {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(row => {
                    return headers.some(h => (row[h] || '').toLowerCase().includes(keyword));
                });
            }
            currentPage = 1;
            renderTable();
        });

        // เปลี่ยนหน้า
        document.getElementById('prevBtn').addEventListener('click', () => { if(currentPage > 1) { currentPage--; renderTable(); }});
        document.getElementById('nextBtn').addEventListener('click', () => { if(currentPage < Math.ceil(filteredData.length / itemsPerPage)) { currentPage++; renderTable(); }});

        // 5. ระบบ Pop-up รายละเอียดเต็มรูปแบบ (ดึงคอลัมน์ทั้งหมดมาแสดง)
        window.showModal = (row) => {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
            headers.forEach(h => {
                html += `
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                    <p class="text-sm text-green-700 font-semibold mb-1">${h}</p>
                    <p class="text-lg text-gray-800 break-words">${row[h] || '<span class="text-gray-400">-</span>'}</p>
                </div>`;
            });
            html += '</div>';

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('sheetModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('sheetModal').classList.add('hidden');
        };
    </script>
</body>
</html>
