<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Dashboard - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#166534] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">📈 ระบบฐานข้อมูลอัจฉริยะ (Google Sheets)</h1>
            <a href="index.html" class="bg-green-800 border border-green-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-green-700 transition shadow-sm">🏠 กลับหน้าหลัก</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-7xl">
        <div id="loading" class="text-center py-20 text-gray-500 text-xl animate-pulse">⏳ กำลังประมวลผลข้อมูล...</div>

        <div id="dashboardContent" class="hidden">
            <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="card">
                    <h3 class="text-lg font-semibold mb-4 text-gray-700" id="chartTitle">จำนวนโครงการ (หลัง ต.ค. ปีปัจจุบัน)</h3>
                    <div class="relative w-full h-64"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="card">
                    <h3 class="text-lg font-semibold mb-4 text-gray-700">ยอดรวมงบประมาณย้อนหลังรายปี (บาท)</h3>
                    <div class="relative w-full h-64"><canvas id="yearChart"></canvas></div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-green-600 overflow-hidden">
                <div class="bg-gray-50 p-6 border-b border-gray-200">
                    <h2 class="text-lg font-bold text-green-800 mb-2">รายการโครงการ (หลัง ต.ค. ปีปัจจุบัน)</h2>
                    <input type="text" id="searchInput" placeholder="ค้นหาข้อมูล..." class="w-full md:w-1/3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-600 outline-none">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr class="bg-green-700 text-white" id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = "1B2-0bB79ftvpEcWTq5wITVb9XlVdZ2g1c1-1ruD_2Bg";
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        let allData = [], filteredData = [], headers = [];
        const displayHeaders = ["ปีงบ", "ชื่อโครงการ", "ชุมชน", "วงเงิน"]; 
        let currentYear = new Date().getFullYear() + 543; // แปลง พ.ศ.

        Papa.parse(SHEET_CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(row => Object.values(row).some(val => val !== ""));
                headers = Object.keys(allData[0]);
                initDashboard();
            }
        });

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');

            // กรองข้อมูล: หลัง ต.ค. ของปีปัจจุบัน
            filteredData = allData.filter(row => {
                let year = parseInt(row["ปีงบ"]);
                return year === currentYear; // ปรับเงื่อนไขนี้ตามรูปแบบวันที่ในชีทของคุณ
            });

            updateSummaryCards(allData);
            drawMainChart();
            drawYearChart(allData);
            renderTableHeader();
            renderTable();
        }

        function updateSummaryCards(dataList) {
            let total = dataList.reduce((sum, row) => sum + parseFloat((row["วงเงิน"]||'0').replace(/,/g,'')), 0);
            document.getElementById('summaryCards').innerHTML = `
                <div class="col-span-2 md:col-span-5 bg-green-700 text-white p-6 rounded-xl shadow">
                    <h3 class="text-green-100 text-sm">ยอดรวมงบประมาณทั้งหมด</h3>
                    <p class="text-4xl font-bold">฿ ${total.toLocaleString()}</p>
                </div>
            `;
        }

        function drawYearChart(data) {
            let yearData = {};
            data.forEach(row => {
                let y = row["ปีงบ"] || 'ไม่ระบุ';
                yearData[y] = (yearData[y] || 0) + parseFloat((row["วงเงิน"]||'0').replace(/,/g,''));
            });

            new Chart(document.getElementById('yearChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: Object.keys(yearData).sort(),
                    datasets: [{ label: 'งบประมาณรายปี', data: Object.values(yearData), borderColor: '#166534', tension: 0.3 }]
                }
            });
        }

        function drawMainChart() {
            let counts = {};
            filteredData.forEach(item => {
                let val = item["ชุมชน"] || 'ไม่ระบุ';
                counts[val] = (counts[val] || 0) + 1;
            });
            new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'bar',
                data: { labels: Object.keys(counts), datasets: [{ label: 'จำนวนโครงการ', data: Object.values(counts), backgroundColor: '#22c55e' }] }
            });
        }

        function renderTableHeader() {
            document.getElementById('tableHeader').innerHTML = displayHeaders.map(h => `<th class="p-4">${h}</th>`).join('');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filteredData.map(row => `
                <tr class="border-b hover:bg-green-50 cursor-pointer" onclick="window.showModal(${JSON.stringify(row).replace(/"/g, '&quot;')})">
                    ${displayHeaders.map(h => `<td class="p-4">${row[h] || '-'}</td>`).join('')}
                </tr>
            `).join('');
        }

        window.showModal = (row) => {
            let html = `<div class="grid grid-cols-1 gap-4">` + Object.entries(row).map(([k,v]) => `<div class="p-3 bg-gray-50 rounded"><strong>${k}:</strong> ${v}</div>`).join('') + `</div>`;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('sheetModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('sheetModal').classList.add('hidden');
    </script>
</body>
</html>
