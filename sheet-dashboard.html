<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Dashboard - เทศบาลนครขอนแก่น</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; font-size: 1.125rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); padding: 1.5rem; }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-[#166534] text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">📈 ระบบฐานข้อมูลโครงการ</h1>
            <a href="index.html" class="bg-green-800 border border-green-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-green-700 transition">🏠 กลับหน้าหลัก</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-7xl">
        <div id="loading" class="text-center py-20 text-gray-500 text-xl animate-pulse">⏳ กำลังประมวลผลข้อมูล...</div>

        <div id="dashboardContent" class="hidden">
            <h2 class="text-xl font-bold text-gray-700 mb-4">สรุปข้อมูล (อัปเดตตามตัวกรอง)</h2>
            <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>

            <div class="card mb-8">
                <h3 class="text-lg font-semibold mb-4 text-gray-700" id="chartTitle">จำนวนโครงการ (หลัง ต.ค. ปีก่อน - ไม่รวมเทศบาล)</h3>
                <div class="relative w-full h-64 md:h-80"><canvas id="mainChart"></canvas></div>
            </div>

            <div class="bg-white rounded-xl shadow-md border-t-4 border-green-600 overflow-hidden">
                <div class="bg-gray-50 p-6 border-b border-gray-200 flex flex-wrap gap-4">
                    <input type="text" id="searchInput" placeholder="🔍 ค้นหา..." class="w-full md:w-1/4 p-3 border rounded-lg shadow-sm">
                    <select id="yearFilter" class="p-3 border rounded-lg bg-white w-full md:w-1/5"><option value="">-- ทุกปีงบ --</option></select>
                    <select id="communityFilter" class="p-3 border rounded-lg bg-white w-full md:w-1/5"><option value="">-- ทุกชุมชน --</option></select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead><tr class="bg-green-700 text-white" id="tableHeader"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1B2-0bB79ftvpEcWTq5wITVb9XlVdZ2g1c1-1ruD_2Bg/export?format=csv";
        let allData = [], filteredData = [], headers = [];
        const displayHeaders = ["ปีงบ", "ชื่อโครงการ", "ชุมชน", "วงเงิน"]; 
        let mainChart = null;

        Papa.parse(SHEET_CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(r => Object.values(r).some(v => v));
                headers = Object.keys(allData[0]);
                populateFilters();
                applyFilters(); // กรองตั้งแต่โหลดเสร็จ
                initDashboard();
            }
        });

        function populateFilters() {
            const years = new Set(allData.map(r => r["ปีงบ"]).filter(v => v));
            const comms = new Set(allData.map(r => r["ชุมชน"]).filter(v => v));
            years.forEach(y => document.getElementById('yearFilter').innerHTML += `<option value="${y}">${y}</option>`);
            comms.forEach(c => document.getElementById('communityFilter').innerHTML += `<option value="${c}">${c}</option>`);
        }

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
            renderTable();
            updateSummaryCards(filteredData);
            drawProjectChart();
        }

        function updateSummaryCards(dataList) {
            let total = dataList.reduce((sum, r) => sum + (parseFloat(String(r["วงเงิน"]||0).replace(/,/g, ''))||0), 0);
            const cards = document.getElementById('summaryCards');
            cards.innerHTML = `<div class="bg-green-700 text-white p-6 rounded-xl">ยอดรวมงบประมาณที่กรอง: <b>฿ ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}</b></div>`;
        }

        function drawProjectChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(mainChart) mainChart.destroy();
            
            const cutoffDate = new Date(`${new Date().getFullYear()-1}-10-01`);
            
            // กรองข้อมูล: หลัง ต.ค. ปีก่อน และไม่ใช่เทศบาล
            const chartData = allData.filter(r => {
                const dateVal = new Date(r["วันที่"] || '2026-01-01');
                const isAfterOct = dateVal >= cutoffDate;
                const isNotMunicipality = !r["หน่วยงาน"]?.includes("เทศบาล") && !r["ชื่อโครงการ"]?.includes("เทศบาล");
                return isAfterOct && isNotMunicipality;
            });

            let counts = {};
            chartData.forEach(r => {
                let cat = r["ชุมชน"] || "ไม่ระบุ";
                counts[cat] = (counts[cat] || 0) + 1;
            });

            mainChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(counts), datasets: [{ label: 'จำนวนโครงการ', data: Object.values(counts), backgroundColor: '#16a34a' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderTable() {
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            filteredData.forEach(row => {
                let tr = document.createElement('tr');
                tr.className = "border-b hover:bg-green-50";
                tr.innerHTML = displayHeaders.map(h => `<td class="p-4">${row[h]||'-'}</td>`).join('');
                body.appendChild(tr);
            });
        }

        function applyFilters() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const comm = document.getElementById('communityFilter').value;

            filteredData = allData.filter(r => {
                const matchKw = Object.values(r).some(v => v?.toLowerCase().includes(kw));
                const matchYear = year === "" || r["ปีงบ"] == year;
                const matchComm = comm === "" || r["ชุมชน"] === comm;
                return matchKw && matchYear && matchComm;
            });

            renderTable();
            updateSummaryCards(filteredData);
            // กราฟไม่จำเป็นต้องอัปเดตตามตัวกรองย่อย เพื่อให้เห็นภาพรวมโครงการทั้งหมดที่เข้าเงื่อนไขเวลา
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('communityFilter').addEventListener('change', applyFilters);
    </script>
</body>
</html>
